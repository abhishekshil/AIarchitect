services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aspe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aspe_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-aspe}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - aspe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-aspe} -d ${POSTGRES_DB:-aspe}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - aspe_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${API_APP_NAME:-AI Solution Planning API}
      APP_ENV: ${API_APP_ENV:-docker}
      DEBUG: ${API_DEBUG:-true}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: ${API_DATABASE_URL:-postgresql+asyncpg://aspe:aspe_dev_change_me@postgres:5432/aspe}
      REDIS_URL: ${API_REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - '${API_HOST_PORT:-8000}:8000'
    command: >
      sh -c "alembic upgrade head &&
             uvicorn solution_planning_api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    ports:
      - '${WEB_PORT:-3000}:3000'
    command: >
      sh -c "pnpm install &&
             pnpm dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

volumes:
  aspe_pg_data:
  aspe_redis_data:
  web_node_modules:
